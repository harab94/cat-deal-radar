app:
  name: cat-deal-radar
  environment: local

monitoring:
  interval_minutes: 10

database:
  path: data/cat_deal_radar.sqlite

config:
  brands_path: config/brands.yaml
  categories_path: config/categories.yaml
  skus_path: config/skus.yaml
  preferences_path: config/preferences.yaml

douban:
  group_url: https://www.douban.com/group/656297/?tab=42899
  tab_name: 闲车禁拼多多
  cookie_env: DOUBAN_COOKIE

email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  username_env: GMAIL_USERNAME
  password_env: GMAIL_APP_PASSWORD
  sender_env: GMAIL_SENDER
  recipient_env: DEAL_NOTIFICATION_RECIPIENT
  use_tls: true

feedback:
  base_url_env: FEEDBACK_BASE_URL

feishu:
  app_id_env: FEISHU_APP_ID
  app_secret_env: FEISHU_APP_SECRET
  base_token_env: FEISHU_BASE_TOKEN
  brands_table_id_env: FEISHU_BRANDS_TABLE_ID
  categories_table_id_env: FEISHU_CATEGORIES_TABLE_ID
  detection_rules_table_id_env: FEISHU_DETECTION_RULES_TABLE_ID
  skus_table_id_env: FEISHU_SKUS_TABLE_ID
