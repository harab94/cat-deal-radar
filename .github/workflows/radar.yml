name: Cat Deal Radar

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cat-deal-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      DEAL_NOTIFICATION_RECIPIENT: ${{ secrets.DEAL_NOTIFICATION_RECIPIENT }}
      FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
      FEISHU_BRANDS_TABLE_ID: ${{ secrets.FEISHU_BRANDS_TABLE_ID }}
      FEISHU_CATEGORIES_TABLE_ID: ${{ secrets.FEISHU_CATEGORIES_TABLE_ID }}
      FEISHU_DETECTION_RULES_TABLE_ID: ${{ secrets.FEISHU_DETECTION_RULES_TABLE_ID }}
      FEISHU_SKUS_TABLE_ID: ${{ secrets.FEISHU_SKUS_TABLE_ID }}
      FEISHU_BRAND_CANDIDATES_TABLE_ID: ${{ secrets.FEISHU_BRAND_CANDIDATES_TABLE_ID }}
      FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh radar state
        run: git pull --ff-only origin main

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run radar
        env:
          CAT_DEAL_RADAR_SEND_TEST_EMAIL: "false"
        run: uv run python -m app.main

      - name: Export web deals
        if: always()
        run: uv run python -m app.web_export

      - name: Persist radar state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f data/cat_deal_radar.sqlite ]; then
            git add -f data/cat_deal_radar.sqlite
          else
            echo "No radar database to persist."
          fi

          if [ -f data/latest-deals.json ]; then
            git add -f data/latest-deals.json
          else
            echo "No web deals export to persist."
          fi

          if git diff --cached --quiet; then
            echo "Radar state unchanged."
            exit 0
          fi

          git commit -m "Persist radar state [skip ci]"

          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash origin main
          done

          git push
