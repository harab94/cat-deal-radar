name: Cat Deal Radar

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      send_test_email:
        description: "Send a fake deal email to verify Gmail delivery"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: cat-deal-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      DEAL_NOTIFICATION_RECIPIENT: ${{ secrets.DEAL_NOTIFICATION_RECIPIENT }}
      FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
      FEISHU_BRANDS_TABLE_ID: ${{ secrets.FEISHU_BRANDS_TABLE_ID }}
      FEISHU_CATEGORIES_TABLE_ID: ${{ secrets.FEISHU_CATEGORIES_TABLE_ID }}
      FEISHU_DETECTION_RULES_TABLE_ID: ${{ secrets.FEISHU_DETECTION_RULES_TABLE_ID }}
      FEISHU_SKUS_TABLE_ID: ${{ secrets.FEISHU_SKUS_TABLE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run radar
        env:
          CAT_DEAL_RADAR_SEND_TEST_EMAIL: ${{ inputs.send_test_email || 'false' }}
        run: uv run python -m app.main

      - name: Persist radar state
        run: |
          if [ ! -f data/cat_deal_radar.sqlite ]; then
            echo "No radar database to persist."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/cat_deal_radar.sqlite

          if git diff --cached --quiet; then
            echo "Radar state unchanged."
            exit 0
          fi

          git commit -m "Persist radar state [skip ci]"
          git push
